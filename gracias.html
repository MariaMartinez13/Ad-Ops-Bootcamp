<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Bienvenido a bordo! | TAG Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            background: linear-gradient(180deg, #ffffff 0%, #ede9fe 100%);
            color: #0f172a;
        }
        .card {
            background: white;
            padding: 50px 30px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            max-width: 450px;
            border: 1px solid #f1f5f9;
        }
        .icon { font-size: 50px; margin-bottom: 20px; display: block; }
        h1 { font-size: 2rem; font-weight: 800; margin-bottom: 16px; letter-spacing: -1px; }
        p { color: #475569; font-size: 1.1rem; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background: #4f46e5;
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.3s ease;
        }
        .btn:hover { transform: scale(1.05); }
    </style>
</head>
<body>
 <div class="card">
    <span class="icon">🚀</span>
    <h1>¡Estás en la lista!</h1>
    <p>Hemos recibido tu registro correctamente. Muy pronto te contactaremos por correo electrónico para confirmarte la <strong>fecha, hora y lugar</strong> de tu primera clase gratis.</p>
    <div style="background: #f5f3ff; padding: 15px; border-radius: 12px; margin-bottom: 25px; font-size: 0.9rem; color: #4f46e5; font-weight: 600;">
        Stay tuned. Global is coming.
    </div>
    <a href="index.html" class="btn">Volver al inicio</a>
</div>
</body>
</html>
